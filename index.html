<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dance Playlist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d1a; color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 20px 12px 32px;
  }
  h1 { font-size: clamp(1.1rem,4vw,1.5rem); color: #aac8ff;
       text-align: center; margin-bottom: 16px; }
  #main-content { display: none; width: 100%; max-width: 480px; }
  #loading { margin-top: 60px; text-align: center; color: #556677; font-size: 1rem; }
  .spinner { width: 48px; height: 48px; border: 5px solid #224466;
             border-top-color: #44ccff; border-radius: 50%;
             animation: spin 0.9s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #card-current {
    border: 2px solid #888; border-radius: 18px;
    padding: 18px 14px 14px; width: 100%;
    text-align: center; margin-bottom: 12px;
  }
  .now-label { font-size: 1rem; letter-spacing: .15em;
               text-transform: uppercase; color: #bb88ff; margin-bottom: 6px; }
  #dance-now { font-size: clamp(3.2rem,14.4vw,5.6rem);
               font-weight: 900; line-height: 1.0; word-break: break-word; }
  #countdown { font-size: clamp(1.4rem,6vw,2rem); color: #ff00ff;
               margin-top: 8px; font-variant-numeric: tabular-nums; }
  #paused-badge { display: none; background: #554400; color: #ffcc44;
                  border-radius: 8px; padding: 5px 16px; font-size: 1rem;
                  font-weight: 700; margin-top: 10px; }
  #upcoming-list { width: 100%; display: flex; flex-direction: column;
                   gap: 10px; margin-bottom: 16px; }
  .up-card { border-radius: 14px; padding: 12px 18px;
             display: flex; align-items: center; gap: 14px; }
  .up-num { font-size: 1rem; color: #4488aa; min-width: 26px;
            text-align: center; flex-shrink: 0; font-weight: 600; }
  .up-name { font-size: clamp(2.8rem,12vw,5rem); font-weight: 900;
             line-height: 1.0; word-break: break-word; }
  #ended-msg { display: none; font-size: 1.6rem; font-weight: 700;
               color: #ee44ff; text-align: center; padding: 24px 12px; }
  #status-bar { font-size: .75rem; color: #445566; margin-top: 4px; text-align: center; }
  #qr-box {
    position: fixed; bottom: 10px; right: 10px;
    background: white; padding: 4px; border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    text-align: center; z-index: 999;
    width: 88px;   /* fixed width so it never overlaps content */
  }
  #qr-box img, #qr-box canvas {
    display: block; width: 80px; height: 80px;
  }
  #qr-label { font-size: 0.45rem; color: #333; margin-top: 2px;
              word-break: break-all; max-width: 80px;
              white-space: normal; }
</style>
</head>

<!-- ═══════════════════════════════════════════════════════════════════════
     CHANGE THIS ONE LINE to your Firebase project URL
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
  var FIREBASE_URL = 'https://dance-playlist-default-rtdb.firebaseio.com/dance.json';
</script>
<!-- ═══════════════════════════════════════════════════════════════════════ -->

<script>
  var firstLoad = true;

  function isColorDark(cssColor) {
    try {
      var c = cssColor.replace('#','');
      if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
      var r = parseInt(c.substr(0,2),16);
      var g = parseInt(c.substr(2,2),16);
      var b = parseInt(c.substr(4,2),16);
      return (r*299 + g*587 + b*114) / 1000 < 128;
    } catch(e) { return true; }
  }

  async function refresh() {
    try {
      var r = await fetch(FIREBASE_URL);
      if (!r.ok) return;
      var d = await r.json();
      if (!d) return;   // Firebase returns null when no data written yet

      if (firstLoad) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        firstLoad = false;
      }

      // Apply background color from Kivy config
      if (d.bg_color) {
        document.body.style.background = d.bg_color;
        document.getElementById('card-current').style.background = d.bg_color;
        var isDark = isColorDark(d.bg_color);
        document.querySelector('h1').style.color       = isDark ? '#aac8ff' : '#223366';
        document.querySelector('.now-label').style.color = isDark ? '#bb88ff' : '#553388';
      }

      if (d.center) {
        document.getElementById('center-name').textContent = '\u{1F3B5} ' + d.center + ' Social Dance';
      }

      var ended  = document.getElementById('ended-msg');
      var card   = document.getElementById('card-current');
      var upList = document.getElementById('upcoming-list');

      if (d.ended) {
        ended.style.display = 'block'; card.style.display = 'none';
        upList.style.display = 'none';
        document.getElementById('status-bar').textContent = '';
        return;
      }

      ended.style.display = 'none'; card.style.display = 'block';
      upList.style.display = 'flex';

      var hlColor = d.current_color || '#ff00ff';
      var nowEl = document.getElementById('dance-now');
      nowEl.textContent    = d.current || '\u2014';
      nowEl.style.color    = hlColor;
      card.style.borderColor = hlColor;
      card.style.boxShadow   = '0 0 24px ' + hlColor + '55';

      document.getElementById('countdown').textContent = d.countdown || '';
      document.getElementById('paused-badge').style.display = d.paused ? 'block' : 'none';

      upList.innerHTML = '';
      (d.upcoming || []).forEach(function(item, i) {
        var name  = (typeof item === 'object') ? item.name  : item;
        var color = (typeof item === 'object') ? (item.color || '#00ffff') : '#00ffff';

        var div = document.createElement('div');
        div.className        = 'up-card';
        div.style.border     = '1px solid ' + color;
        div.style.background = d.bg_color || '#0a1628';

        var ns = document.createElement('span');
        ns.className = 'up-num'; ns.textContent = String(i + 1);

        var ts = document.createElement('span');
        ts.className = 'up-name'; ts.textContent = name; ts.style.color = color;

        div.appendChild(ns); div.appendChild(ts); upList.appendChild(div);
      });

      document.getElementById('status-bar').textContent =
        'Updated ' + new Date().toLocaleTimeString();

    } catch(e) {
      if (firstLoad) {
        document.getElementById('loading').textContent = 'Waiting for playlist to start...';
      } else {
        document.getElementById('status-bar').textContent = 'Reconnecting...';
      }
    }
  }

  refresh();
  setInterval(refresh, 1000);

  // QR image is embedded directly as base64 — no library, always works
  document.getElementById('qr-label').textContent =
    'https://tilonv.github.io/dance-playlist/';
</script>
</html>
